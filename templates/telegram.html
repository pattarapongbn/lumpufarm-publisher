<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>LumpuFarm — Telegram Banner (1280x720)</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/telegram.css">
</head>
<body>
  <main class="poster">

    <header class="poster-header">
      <div class="header-inner">
        <div class="header-left">
          <div class="brand">
            <img class="brand-logo" src="../assets/logo.png" alt="LumpuFarm">
            <div class="brand-text">
              <div class="brand-name">LumpuFarm</div>
              <div class="brand-tag">Agricultural Market Data</div>
            </div>
          </div>
          <div class="headline">
            <h1 class="headline-title"></h1>
            <div class="headline-subtitle"></div>
          </div>
        </div>
        <div class="date-card">
          <div class="date-card-label">ประจำวันที่</div>
          <div class="date-card-value"></div>
          <div class="date-card-updated"></div>
        </div>
      </div>
    </header>

    <section class="poster-body">
      <div class="market-grid"></div>
      <div class="extremes"></div>
    </section>

    <footer class="poster-footer">
      <div class="footer-inner">
        <div class="summary-stats"></div>
        <div class="footer-meta">
          <div class="footer-sources"></div>
          <div class="footer-brand">
            <img src="../assets/logo.png" alt="">
            <span>LumpuFarm</span>
          </div>
        </div>
      </div>
    </footer>

  </main>

  <script type="module" src="scripts/poster.js"></script>
</body>
</html>

services:
  lumpufarm-publisher:
    build: .
    container_name: lumpufarm-publisher
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - TZ=${TZ:-Asia/Bangkok}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - FB_PAGE_ID=${FB_PAGE_ID:-}
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN:-}
      - FB_GRAPH_VERSION=${FB_GRAPH_VERSION:-v21.0}
    volumes:
      # Generated images and logs survive container rebuilds.
      - ./storage/images:/app/storage/images
      - ./storage/logs:/app/storage/logs
    # Chromium needs a larger shared memory segment than Docker's 64MB default.
    shm_size: 1gb
